# Bouračka — Field Definition Catalogue
# ─────────────────────────────────────────────────────────────────────────────
# Source        : SUPIN_Bouracka_summary_ANA_v6.xlsx, tab "Data"
# Captured from : photo set IMG_1063..IMG_1066 (analyticke vstupy/lists of values/)
# Captured on   : 2026-05-05  by Cowork Opus / CP-SUPIN-02 rev 6
# Resolves OQ   : OQ-CP-21 (the "definiční excel")
#
# This file is the canonical machine-readable catalogue of every UI/data
# field in the bouracka.cz application. 121 entries. Every entry corresponds
# to one row of the source Excel "Data" tab.
#
# How to add or change a value:
#   1. Edit one entry below. Bump file version in `meta`.
#   2. If a field's `codelist` references a not-yet-defined codelist,
#      add it to fixtures/codelists.yaml (see meta.codelists_referenced).
#   3. Run `node tools/validate-field-definitions.js` (CP-SUPIN-03 deliverable).
#   4. Commit; both this YAML and the Excel master should agree.
#
# Note on DEMO vs Bouračka:
#   Default `applies_to` is the production-equivalent Bouračka schema (and
#   tst.bouracka.cz). For DEMO (tst.demo.bouracka.cz) divergences per scope
#   C-5 ("reduced validation"), use `demo_overrides:` per field as they
#   become known. The meta block tracks the audit posture.
#
# Field key conventions:
#   id                : F-NNN zero-padded (canonical; never re-numbered)
#   entity            : Report | Participant | Witness |
#                       ParticipantVehicleMovementDefinition |
#                       ParticipantVehicleDamageLocation | VehiclePolicyholder
#   attribute         : Czech FE attribute name verbatim from doc
#   screen            : "Obrazovka / sekce" verbatim
#   fe_type           : inputbox | inputbox+kalendář | inputbox(read only) |
#                       combobox | multichoice | checkbox | radiobutton |
#                       QR kód | nezobrazeno
#   required_fe       : ano | ne | nezobrazeno | "pouze pokud je dostupné" |
#                       n/a
#   data_type         : string(N) | integer(N) | datetime | date | time |
#                       boolean | UUID | decimal(P,S)
#   codelist          : reference to fixtures/codelists.yaml entry or ~
#   input_from        : Aplikace | Uživatel | Uživatel (SMS) |
#                       OCR fotky OP (ZenID) | OCR fotky SPZ (ZenID) |
#                       AISPOV (ROB, CRR) | AISPOV (CRR) | AISPOV (CRV) |
#                       AISPOV (Evidence poj. vozidel) | Google Maps | RUIAN
#   output_to         : "Vyplněné PDF" | "Aplikace" | ~
#   rules             : free-text validation/behaviour rules from doc
#   demo_overrides    : map of {field-key: new-value} for tst.demo if known
#   notes             : free-text human notes (we add)
# ─────────────────────────────────────────────────────────────────────────────

meta:
  schema_version: 0.1.0
  source_workbook: SUPIN_Bouracka_summary_ANA_v6.xlsx
  source_tab: Data
  source_excel_other_tabs: [Obrazovky stavy, Číselníky]   # to be ingested next
  total_fields: 121
  fields_with_codelist: 8       # see codelists_referenced
  fields_active_in_mvp: 101     # 121 minus 20 VehiclePolicyholder placeholders
  fields_placeholder_only: 20   # VehiclePolicyholder block — "aktuálně bez využití"
  applies_to: [bouracka, tst.bouracka.cz]
  demo_status: pending            # tst.demo.bouracka.cz delta layer not yet captured
  captured_at: 2026-05-05

codelists_referenced:
  - id: CL-STAVY-HLASENI
    name_cs: Stavy hlášení
    notes: accidentReportStatus enum — see _specs/ANALYTICAL-DOC-INTELLIGENCE-v0.2.md §2.7
  - id: CL-ZNACKY-MODEL
    name_cs: Značky a model
    notes: Vehicle make + model catalogue; AISPOV-sourced
  - id: CL-SKUPINY-OPRAVNENI
    name_cs: Skupiny řidičských oprávnění
    notes: License categories (A, A1, B, BE, C, CE, C1E, etc.)
  - id: CL-DEFINICE-POHYBU
    name_cs: Definice pohybů vozidla
    notes: Vehicle-movement before collision
  - id: CL-POSKOZENI-CASTI
    name_cs: Poškození částí vozidla
    notes: Damage location markers (vehicle outline)
  - id: CL-SITUACNI-NAKRES
    name_cs: Situační nákres
    notes: Predefined collision-position diagrams
  - id: CL-POJISTOVNY
    name_cs: Pojišťovny
    notes: Insurance company list with STATUS=AKT/INA filter
  - id: CL-VINIK-NEHODY
    name_cs: Viník nehody
    notes: Fault-party radiobutton (vlastní / protistrana / neurčeno)

