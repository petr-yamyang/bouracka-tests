    name_cs: Stavy hlášení
    name_en: Report status
    referenced_by: [F-004]
    notes: |
      The accidentReportStatus state machine. Values inferred from
      the analytical doc text (not yet from the Číselníky tab):
        NEW
        IN_PROGRESS_DRIVERS
        IN_PROGRESS_VEHICLES
        IN_PROGRESS_CIRCUMSTANCES
        TO_SIGN
        FINISHED
        CANCEL
