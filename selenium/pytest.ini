[pytest]
# CP-SUPIN-05 — Selenium pytest configuration
#
# IMPORTANT: namespace-collision guard
# -------------------------------------
# The test root directory is named "selenium/" which conflicts with the installed
# selenium WebDriver package.  Without explicit pythonpath configuration pytest
# (depending on version) may add the *parent* of this directory to sys.path and
# allow Python to resolve "import selenium" to the local directory as a namespace
# package, shadowing the installed package.
#
# Setting pythonpath = . (relative to this file, i.e. the selenium/ directory)
# keeps the helpers/ sub-package importable as "helpers.X" and ensures that
# "from selenium import webdriver" always resolves to the installed package in
# site-packages.  Never import helpers via "selenium.helpers.X" — use "helpers.X".
#
# Reference: https://docs.pytest.org/en/stable/reference/reference.html#ini-options-ref
#
pythonpath = .

# Reduce noise; increase for debugging
log_level = WARNING

# Default test path — override on CLI if needed
testpaths = tests

# Ignore node_modules etc. if pytest is run from parent directory
norecursedirs = node_modules .git __pycache__ .pytest_cache archive delivery
