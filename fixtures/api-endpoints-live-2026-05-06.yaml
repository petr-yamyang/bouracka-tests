# ─────────────────────────────────────────────────────────────────────────────
# Internal /api/* — Bouračka backend (INT-008)
# ─────────────────────────────────────────────────────────────────────────────

internal:

  # Reports lifecycle
  - {verb: POST,  path: /api/reports,                                                   purpose: "create new accident report; returns UUID",                                triggered_at: "click Rozumím on /informations"}
  - {verb: GET,   path: /api/reports/{reportUuid},                                      purpose: "fetch full report state (hydration)",                                     triggered_at: "every route mount"}
  - {verb: GET,   path: /api/reports/{reportUuid}/completenessStatus,                   purpose: "per-section completeness map (drives progress bar)",                      triggered_at: "Phase 2 recap submit"}

  # Phase 1 — Verification
  - {verb: PUT,   path: /api/reports/{reportUuid}/reporter,                             purpose: "save reporter (participant A) phone — first PUT in flow",                triggered_at: "Phase 1 'Odeslat kód' for A"}
  - {verb: POST,  path: /api/reports/{reportUuid}/participants,                         purpose: "create participant B (B is added after A is verified)",                  triggered_at: "Phase 1 'Odeslat kód' for B"}
  - {verb: GET,   path: /api/reports/{reportUuid}/participantsInVerification,           purpose: "fetch verification state for both participants",                          triggered_at: "verification-screen mount + after each verify"}
  - {verb: GET,   path: /api/reports/{reportUuid}/participants,                         purpose: "fetch all participants",                                                  triggered_at: "post-verification + per-recap"}
  - {verb: POST,  path: /api/reports/{reportUuid}/participants/{participantUuid}/sendCodeToVerify,  purpose: "trigger OTP send (no-op on DEMO)", triggered_at: "Phase 1 'Odeslat kód'"}
  - {verb: POST,  path: /api/reports/{reportUuid}/participants/{participantUuid}/verify,           purpose: "submit OTP for verification (DEMO accepts any 4-digit)", triggered_at: "Phase 1 'Ověřit'"}
  - {verb: POST,  path: /api/session/refresh,                                           purpose: "rotate session token at phase boundary",                                   triggered_at: "after each verify-success + recap-save"}

  # Phase 2 — Documents (per participant)
  - {verb: GET,   path: /api/reports/{reportUuid}/participants/{participantUuid},       purpose: "fetch single participant data",                                            triggered_at: "Phase 2 manual-form mount"}
  - {verb: PUT,   path: /api/reports/{reportUuid}/participants/{participantUuid}/participantData,  purpose: "save personal data (jméno, příjmení, OP, dob, address)",       triggered_at: "Phase 2 form submit"}
  - {verb: PUT,   path: /api/reports/{reportUuid}/participants/{participantUuid}/email, purpose: "save email (separate PUT — email change is its own state)",                triggered_at: "Phase 2 recap 'Uložit'"}
  - {verb: PUT,   path: /api/reports/{reportUuid}/participants/{participantUuid}/drivingLicense/update,  purpose: "save ŘP (number, categories)",                       triggered_at: "Phase 2 form submit"}

  # Phase 2.5 — Witnesses
  - {verb: GET,   path: /api/reports/{reportUuid}/witnesses,                            purpose: "fetch witnesses list",                                                     triggered_at: "witness-screen mount"}
  # POST/PUT for witnesses TBC — not yet exercised

  # Phase 3 — Damage
  - {verb: PUT,   path: /api/reports/{reportUuid}/participants/{participantUuid}/damage, purpose: "save damage description + zones",                                         triggered_at: "Phase 3 damage-form submit"}
  - {verb: PUT,   path: /api/reports/{reportUuid}/participants/{participantUuid}/movementDefinition, purpose: "save vehicle-movement choice",                              triggered_at: "Phase 3 movement-form submit"}
  # vehicle data PUT TBC — about to be observed in next walk
  # SPZ photo POST TBC

  # Phase 4 — Signing TBC

  # Codelists / enumerations
  - {verb: GET,   path: /api/enumerations/insuranceCompanies,                           purpose: "list of motor-TPL insurers",                                              response_count: 13}
  - {verb: GET,   path: /api/enumerations/vehicleBrands,                                purpose: "complete vehicle brands+models catalogue",                                response_count: 275, payload_size_kb: 32}
  - {verb: GET,   path: /api/enumerations/licenseCategories,                            purpose: "ŘP categories",                                                            status: 403, notes: "endpoint protected; codelist arrives via bundle JS instead"}

